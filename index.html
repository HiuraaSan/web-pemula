<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-black text-white font-sans selection:bg-yellow-400 selection:text-black">

    <header class="max-w-4xl mx-auto px-6 py-20 flex flex-col items-center text-center justify-center min-h-[50vh]">
        <p class="text-xs tracking-widest text-gray-500 font-mono">// Hiuraa</p>
        <h1 class="text-5xl font-extrabold mt-4 mb-6">
            Halo Saya <span class="text-gray-400">Hiuraa</span>
        </h1>
        <p class="text-lg text-gray-400 max-w-xl mx-auto mb-8">
            Game Dev FullStack, Artist, Designer, Game Assets Maker
        </p>
        <a href="#" class="border border-white px-6 py-3 text-sm font-mono hover:bg-white hover:text-black transition">
            See My Work
        </a>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 text-center">
        <p class="text-gray-500 text-sm font-mono">this is my simple portofolio.</p>
    </main>

    <div class="fixed bottom-6 right-6 w-80 bg-neutral-950 border border-neutral-800 p-4 font-mono text-xs text-neutral-400 shadow-2xl z-50">
        
        <div class="flex gap-1 mb-3">
            <div class="h-1 w-16 bg-yellow-400"></div>
            <div class="h-1 w-4 bg-neutral-800"></div>
        </div>

        <div class="border border-neutral-800 px-2 py-1 inline-block text-[10px] uppercase tracking-wider text-neutral-500 mb-2 font-bold">
            // NOW PLAYING
        </div>

        <div id="errormsg" class="border border-red-950/50 bg-red-950/10 text-red-400 text-center py-1 mb-4 text-[10px] tracking-wide">
            Cannot play this track
        </div>

        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-neutral-800 border border-neutral-700 rounded-full flex items-center justify-center relative overflow-hidden animate-[spin_6s_linear_infinite]">
                    <div class="w-3 h-3 bg-neutral-950 rounded-full border border-neutral-700 z-10"></div>
                    <div class="absolute inset-0 bg-[radial-gradient(circle,transparent_40%,rgba(0,0,0,0.4)_41%)]"></div>
                </div>
                <div>
                    <h4 class="text-white font-sans font-bold text-sm tracking-tight uppercase">Separuh Aku</h4>
                    <p class="text-gray-500 text-[10px]">NOAH</p>
                </div>
            </div>
            <div class="flex gap-0.5 items-end h-3">
                <div class="w-0.5 h-2 bg-yellow-400/50"></div>
                <div class="w-0.5 h-3 bg-yellow-400"></div>
                <div class="w-0.5 h-1 bg-yellow-400/30"></div>
            </div>
        </div>

        <div class="border-t border-neutral-800 pt-3 mb-4">
            <div class="flex justify-between text-[10px] text-neutral-500 mb-1">
                <span>0:00</span>
                <span>4:20</span>
            </div>
            <div class="h-0.5 bg-neutral-800 w-full rounded-full overflow-hidden">
                <div class="h-full bg-neutral-700 w-1/3"></div>
            </div>
        </div>

        <div class="flex items-center justify-center gap-2 mb-4">
            <button class="border border-neutral-800 hover:border-neutral-700 hover:text-white p-2 transition cursor-pointer">⏮️</button>
            <button id="musicBtn" class="bg-yellow-400 hover:bg-yellow-300 text-black p-3 font-bold transition shadow-[0_0_15px_rgba(250,204,21,0.2)] cursor-pointer text-sm">
                ▶️
            </button>
            <button class="border border-neutral-800 hover:border-neutral-700 hover:text-white p-2 transition cursor-pointer">⏭️</button>
        </div>

        <div class="flex justify-between items-center text-neutral-500 pt-2 border-t border-neutral-900">
            <div class="flex items-center gap-2 w-1/2">
                <span>🔊</span>
                <div class="h-1 bg-neutral-800 w-full rounded-full relative flex items-center">
                    <div class="h-full bg-yellow-400 w-2/3 rounded-full"></div>
                    <div class="w-2.5 h-2.5 bg-yellow-400 rounded-full absolute left-[66%] shadow"></div>
                </div>
            </div>
            <div class="flex gap-1">
                <button class="border border-neutral-800 p-1 hover:text-white text-[10px]">🗒️</button>
                <button class="border border-neutral-800 p-1 hover:text-white text-[10px]">🔍</button>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="assets/song/bg-music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let isPlaying = false;

        musicBtn.addEventListener('click', function() {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.textContent = '▶️'; // Kembali ke logo play saat musik dijeda
            } else {
                bgMusic.play().then(() => {
            // JIKA BERHASIL: Pastikan tulisan error disembunyikan (ditambah class hidden)
            errormsg.classList.add('hidden');
        }).catch((error) => {
            // JIKA GAGAL (karena file hilang atau diblokir browser): Memunculkan tulisan error (hapus class hidden)
            errormsg.classList.remove('hidden');
            console.log("Playback gagal:", error);
        });
        
        musicBtn.textContent = '⏸️';
    }
    isPlaying = !isPlaying;
});
    </script>

</body>
</html>
